name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: {persist-credentials: false}
      - name: Validate repository scaffolding
        run: ./scripts/validate-repository.sh
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            #build plan/**
      - name: Scan committed content for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  swift:
    if: ${{ hashFiles('Package.swift', '*.xcodeproj/project.pbxproj', '*.xcworkspace/contents.xcworkspacedata') != '' }}
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: {persist-credentials: false}
      - name: Select strict Swift settings
        run: echo 'SWIFT_STRICT_CONCURRENCY=complete' >> "$GITHUB_ENV"
      - name: Resolve and test Swift package
        if: ${{ hashFiles('Package.swift') != '' }}
        run: swift package resolve && git diff --exit-code Package.resolved && swift test -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors
      - name: Build unsigned Xcode schemes
        if: ${{ hashFiles('Koru.xcodeproj/project.pbxproj') != '' }}
        run: ./scripts/build-unsigned.sh

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: {persist-credentials: false}
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          license-check: true
