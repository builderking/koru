name: Native
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify no external package dependencies
        run: test "$(swift package show-dependencies --format json | jq '.dependencies | length')" = 0
      - name: Build and test unsigned native targets
        run: ./scripts/check
      - name: Scan tracked files for common private keys
        run: '! git grep -nE -- "BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|AKIA[0-9A-Z]{16}"'
