name: Compatibility report
description: Report a target application outcome without user content.
title: "[Compatibility]: "
labels: [compatibility, needs-triage]
body:
  - type: markdown
    attributes: {value: "Use a dedicated test document and synthetic text. Never attach real content or an unreviewed support bundle."}
  - type: input
    id: versions
    attributes: {label: Koru, macOS, and target app versions}
    validations: {required: true}
  - type: dropdown
    id: mode
    attributes:
      label: Observed capability
      options: [Full, Paste, Copy-only, Palette-only, Blocked]
    validations: {required: true}
  - type: textarea
    id: matrix
    attributes: {label: Permission state and synthetic steps}
    validations: {required: true}
  - type: checkboxes
    id: privacy
    attributes:
      label: Confirmation
      options:
        - label: I used only synthetic content and removed paths, URLs, and document/window names.
          required: true
