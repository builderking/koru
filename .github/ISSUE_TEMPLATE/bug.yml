name: Bug report
description: Report reproducible behavior using synthetic content only.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: "Do not paste saved items, clipboard contents, typed queries, file paths, URLs, credentials, client data, or support bundles into a public issue. Use made-up test content."
  - type: input
    id: version
    attributes: {label: Koru version/build, placeholder: "No release / v0.0.0 (build 0)"}
    validations: {required: true}
  - type: input
    id: environment
    attributes: {label: macOS, Mac architecture, and target app version}
    validations: {required: true}
  - type: dropdown
    id: capability
    attributes:
      label: Documented capability
      options: [Full, Paste, Copy-only, Palette-only, Blocked, Unknown]
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Reproduction with synthetic content, description: "Use a value such as KORU_TEST_ALPHA only."}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected and actual behavior}
    validations: {required: true}
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed private content and used only synthetic examples.
          required: true
        - label: This is not a security vulnerability or suspected private-data exposure.
          required: true
